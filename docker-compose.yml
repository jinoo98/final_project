services:
  web:
    build: .
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    env_file:
      - .env
    stdin_open: true
    tty: true

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: sh -c "npm install && npm run dev -- --host"

  ai:
    build: ./ai_server
    volumes:
      - ./ai_server:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   restart: unless-stopped
  #   environment:
  #     NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
  #   depends_on:
  #     - frontend

volumes:
  ollama_data:
  hf_cache:
